<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0F172A"/>

  <!-- Gradient border -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="21" fill="none"
        stroke="url(#border)" stroke-width="3"/>

  <!-- Bracket left -->
  <text x="6" y="62"
        font-family="'Courier New', Courier, monospace"
        font-weight="900" font-size="20"
        fill="#F59E0B" opacity="0.9">&lt;</text>

  <!-- CDG -->
  <text x="50" y="65"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-weight="900" font-size="34"
        fill="url(#grad)">CDG</text>

  <!-- Bracket right slash -->
  <text x="78" y="62"
        font-family="'Courier New', Courier, monospace"
        font-weight="900" font-size="20"
        fill="#F59E0B" opacity="0.9">/&gt;</text>

  <!-- Subtle bottom accent line -->
  <line x1="20" y1="78" x2="80" y2="78"
        stroke="url(#grad)" stroke-width="1.5"
        stroke-linecap="round" opacity="0.35"/>
</svg>
