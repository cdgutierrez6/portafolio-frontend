sonar.projectKey=cdgutierrez6_portafolio-frontend
sonar.projectName=Portfolio Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=src/__tests__
sonar.language=ts
sonar.sourceEncoding=UTF-8

# Coverage report generated by: npx vitest run --coverage --coverage.reporter=lcov
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage scope: only src/lib (pure utility functions testable in isolation)
# Components, pages and hooks require Next.js/browser context — excluded from coverage
sonar.coverage.exclusions=src/app/**,src/components/**,src/data/**,src/hooks/**,src/app/globals.css,**/*.d.ts,src/middleware.ts
sonar.cpd.exclusions=src/__tests__/**
sonar.test.inclusions=src/__tests__/**/*.test.ts,src/__tests__/**/*.test.tsx
